name: projetomobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.2.0
  provider: ^6.1.5+1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Instrument Sans
      fonts:
        - asset: fonts/InstrumentSans.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: fonts/Inter.ttf
          weight: 600
